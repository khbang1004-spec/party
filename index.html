<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 1교 여은파 초대장</title>
    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 파이어베이스 SDK (v10 compat 버전으로 CDN 활용) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .elegant-font { font-family: 'Gowun Batang', serif; }
        ::-webkit-scrollbar { width: 0px; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        .animate-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-[#fceef3]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // 아이콘 컴포넌트 (Lucide 아이콘을 SVG로 직접 구현)
        const CrownIcon = ({ className }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></svg>
        );
        const SparklesIcon = ({ className, size = 24 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
        );
        const GemIcon = ({ className, size = 16 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M6 3h12l4 6-10 12L2 9z"/><path d="M11 3 8 9l3 12"/><path d="M13 3l3 6-3 12"/><path d="M2 9h20"/></svg>
        );
        const SendIcon = ({ className, size = 16 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
        );
        const EditIcon = ({ className, size = 12 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
        );
        const TrashIcon = ({ className, size = 12 }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>
        );

        // --- Firebase 설정 로직 ---
        const getFirebaseConfig = () => {
            if (typeof window.__firebase_config !== 'undefined' && window.__firebase_config) {
                return JSON.parse(window.__firebase_config);
            }
            return {
                apiKey: "AIzaSyA6n3vH4IiEp_RJSd--MOiDmcd6SrIhHA0",
                authDomain: "garam-48988.firebaseapp.com",
                projectId: "garam-48988",
                storageBucket: "garam-48988.firebasestorage.app",
                messagingSenderId: "677063999756",
                appId: "1:677063999756:web:84f32659da577e242e8929"
            };
        };

        const config = getFirebaseConfig();
        firebase.initializeApp(config);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // 중요: Canvas 프리뷰 환경에서는 window.__app_id를 우선 사용해야 권한 오류가 발생하지 않습니다.
        const currentAppId = typeof window.__app_id !== 'undefined' ? window.__app_id : "garam-party-2025";

        function App() {
            const [showTeams, setShowTeams] = useState(false);
            const [user, setUser] = useState(null);
            const [rawComments, setRawComments] = useState([]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [formData, setFormData] = useState({ name: '', allergies: '', wishes: '', message: '' });
            const [editingId, setEditingId] = useState(null);
            const [editFormData, setEditFormData] = useState({ allergies: '', wishes: '', message: '' });
            const [deletingId, setDeletingId] = useState(null);

            // 자바스크립트 메모리에서 정렬 (Rule 2 준수)
            const sortedComments = useMemo(() => {
                return [...rawComments].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
            }, [rawComments]);

            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof window.__initial_auth_token !== 'undefined' && window.__initial_auth_token) {
                            await auth.signInWithCustomToken(window.__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (error) {
                        console.error("Auth error:", error);
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                
                // Rule 1 준수: /artifacts/{appId}/public/data/{collectionName}
                const commentsRef = db.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('comments');
                
                // Rule 2 준수: orderBy() 제거 및 에러 콜백 추가
                const unsubscribe = commentsRef.onSnapshot((snapshot) => {
                    const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setRawComments(data);
                }, (error) => {
                    console.error("Firestore Permission/Snapshot Error:", error);
                    if (error.code === 'permission-denied') {
                        console.warn("Firebase Console에서 Firestore 규칙이 '테스트 모드'인지 확인해 주세요.");
                    }
                });
                return () => unsubscribe();
            }, [user]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!user || !formData.name.trim()) return;
                setIsSubmitting(true);
                try {
                    const commentsRef = db.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('comments');
                    await commentsRef.add({
                        name: formData.name,
                        allergies: formData.allergies || '없음',
                        wishes: formData.wishes || '없음',
                        message: formData.message || '',
                        createdAt: Date.now(),
                        userId: user.uid
                    });
                    setFormData({ name: '', allergies: '', wishes: '', message: '' });
                } catch (error) {
                    console.error("Error adding document:", error);
                } finally {
                    setIsSubmitting(false);
                }
            };

            const handleUpdate = async (id) => {
                try {
                    const docRef = db.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('comments').doc(id);
                    await docRef.update({
                        allergies: editFormData.allergies || '없음',
                        wishes: editFormData.wishes || '없음',
                        message: editFormData.message || ''
                    });
                    setEditingId(null);
                } catch (error) { console.error(error); }
            };

            const handleDelete = async (id) => {
                try {
                    const docRef = db.collection('artifacts').doc(currentAppId).collection('public').doc('data').collection('comments').doc(id);
                    await docRef.delete();
                    setDeletingId(null);
                } catch (error) { console.error(error); }
            };

            const jamcons = [
                { id: 1, title: '제 1장 : 공주들의 만찬', desc: '기본음식 제공, 조별로 랜덤음식 시키기' },
                { id: 2, title: '제 2장 : 공주들의 선물 교환식', desc: '작은 선물 사와 제비뽑기로 선물 줄 사람 뽑고 그 사람한테 선물 전달하기(집들이 선물 X)' },
                { id: 3, title: '제 3장 : 공주들의 유희', desc: '보드게임 제공하나, 더 가져오고 싶으면 가져오기 아니면 경희 연애스토리 듣기^_^' }
            ];

            const teams = [
                { name: '1조', members: ['방경희', '강지혜', '김해인', '문예진'] },
                { name: '2조', members: ['양은경', '유수빈', '정선호', '정수빈'] },
                { name: '3조', members: ['주민지', '주하영', '최윤영'] }
            ];

            return (
                <div className="min-h-screen py-10 px-4 flex justify-center items-start elegant-font text-[#5e4b56]">
                    <div className="w-full max-w-md bg-white/80 backdrop-blur-sm relative shadow-2xl rounded-t-[100px] rounded-b-3xl overflow-hidden border-2 border-[#f0d0de] p-2">
                        <div className="w-full h-full border border-dashed border-[#e6b3c9] rounded-t-[90px] rounded-b-2xl pb-12 pt-14 px-6 relative bg-white/50">
                            
                            <div className="absolute top-10 left-8 text-pink-300 animate-pulse z-20"><SparklesIcon size={20} /></div>
                            <div className="absolute top-16 right-10 text-purple-300 animate-pulse z-20"><SparklesIcon size={24} /></div>
                            <div className="absolute top-[320px] right-1 text-3xl opacity-90 z-20">🦢</div>
                            <div className="absolute top-[650px] left-1 text-3xl opacity-90 z-20">🎀</div>
                            <div className="absolute bottom-[40px] right-4 text-3xl opacity-90 z-20">🍰</div>

                            <div className="flex flex-col items-center">
                                <CrownIcon className="w-10 h-10 text-[#d4af37] mb-4 drop-shadow-sm" />
                                <p className="text-sm font-bold tracking-[0.2em] text-[#d4af37] mb-2">2025 1교 여은파</p>
                                <h1 className="text-3xl font-bold tracking-widest text-[#4a3642] text-center leading-snug mb-8">경희의 집에<br/>초대합니다</h1>

                                <div className="text-center space-y-2 text-lg text-[#7c6373] leading-relaxed mb-10 border-y border-[#e6b3c9]/50 py-4 w-full px-4">
                                    <p>아름다운 이웃나라 공주님들, 환영합니다.</p>
                                    <p>경희공쥬의 집이 예쁘게 단장되어</p>
                                    <p>우리만의 은밀한 파티를 개최합니다.</p>
                                </div>

                                <div className="w-full bg-[#fdf2f6] rounded-2xl py-6 text-center space-y-3 mb-10">
                                    <p className="text-xl font-bold"><span className="text-[#c58ea4] text-sm block mb-1">일시</span>2025년 4월 13일 월요일 오후 5:30</p>
                                    <p className="text-xl font-bold"><span className="text-[#c58ea4] text-sm block mt-3 mb-1">장소</span>경희네 집</p>
                                    <p className="text-sm font-bold text-[#a28695]">천안시 노태산로 145 두정e편한세상2차 107-802</p>
                                    <div className="mt-4 pt-4 border-t border-dashed border-[#e6b3c9] w-2/3 mx-auto">
                                        <p className="text-base font-bold text-[#d4af37]">드레스 코드: 핑크나 보라 아이템 포함</p>
                                    </div>
                                </div>

                                <div className="w-full mb-12">
                                    <div className="flex items-center justify-center space-x-2 mb-5 text-[#c58ea4]"><GemIcon /><p className="text-xl font-bold">개꿀잼파티 식순</p><GemIcon /></div>
                                    <div className="space-y-4">
                                        {jamcons.map(jc => (
                                            <div key={jc.id} className="border border-[#f0d0de] bg-white rounded-2xl px-5 py-4 shadow-sm">
                                                <div className="text-lg font-bold text-[#5e4b56] mb-1">{jc.title}</div>
                                                <div className="text-sm text-[#8a7281] leading-relaxed">{jc.desc}</div>
                                                {jc.id === 1 && (
                                                    <div className="mt-3">
                                                        <button onClick={() => setShowTeams(!showTeams)} className="text-xs font-bold bg-[#fdf2f6] text-[#c58ea4] border border-[#e6b3c9] px-3 py-1.5 rounded-lg">
                                                            {showTeams ? '닫기' : '조 확인하기 👑'}
                                                        </button>
                                                        {showTeams && (
                                                            <div className="mt-3 p-3 bg-white/60 border border-[#f0d0de] rounded-xl space-y-2 text-xs">
                                                                {teams.map((t, idx) => (
                                                                    <div key={idx} className="flex justify-between border-b border-dashed border-[#f0d0de] pb-1 last:border-0">
                                                                        <span className="font-bold text-[#c58ea4]">{t.name}</span>
                                                                        <span className="text-[#8a7281]">{t.members.join(', ')}</span>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <div className="w-full mb-8">
                                    <div className="flex items-center justify-center space-x-2 mb-6 border-b border-[#f0d0de] pb-2 text-[#c58ea4]"><p className="text-xl font-bold">만찬 메뉴 & 방명록 🥂</p></div>
                                    <form onSubmit={handleSubmit} className="space-y-4 bg-[#fcf8f9] p-5 rounded-2xl border border-[#e6b3c9] shadow-sm mb-8">
                                        <div><label className="text-xs font-bold text-[#a28695] ml-1">존함</label><input required className="w-full border border-[#f0d0de] rounded-xl px-4 py-2 text-sm mt-1 outline-none font-sans" placeholder="이름을 적어주세요" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} /></div>
                                        <div><label className="text-xs font-bold text-[#a28695] ml-1">못 먹는 음식</label><input className="w-full border border-[#f0d0de] rounded-xl px-4 py-2 text-sm mt-1 outline-none font-sans" placeholder="알레르기 등" value={formData.allergies} onChange={e => setFormData({...formData, allergies: e.target.value})} /></div>
                                        <div><label className="text-xs font-bold text-[#a28695] ml-1">먹고싶은 음식</label><input className="w-full border border-[#f0d0de] rounded-xl px-4 py-2 text-sm mt-1 outline-none font-sans" placeholder="메뉴 신청" value={formData.wishes} onChange={e => setFormData({...formData, wishes: e.target.value})} /></div>
                                        <div><label className="text-xs font-bold text-[#a28695] ml-1">남기고 싶은 말</label><textarea className="w-full border border-[#f0d0de] rounded-xl px-4 py-2 text-sm mt-1 outline-none h-16 resize-none font-sans" placeholder="메시지를 남겨주세요" value={formData.message} onChange={e => setFormData({...formData, message: e.target.value})} /></div>
                                        <button type="submit" disabled={isSubmitting} className="w-full bg-[#5e4b56] text-white py-3 rounded-xl font-bold flex justify-center items-center shadow-md active:scale-95 transition-all">
                                            {isSubmitting ? '전송 중...' : '방명록 남기기'} <SendIcon className="ml-2" />
                                        </button>
                                    </form>

                                    <div className="space-y-4">
                                        <div className="bg-[#fdf2f6] border border-[#f0d0de] rounded-xl p-4 shadow-sm relative overflow-hidden">
                                            <div className="flex items-center space-x-2 mb-2"><CrownIcon className="w-4 h-4 text-[#d4af37]" /><span className="font-bold">경희 호스트</span></div>
                                            <div className="text-xs text-[#7c6373] space-y-1 bg-white/60 p-3 rounded-lg border border-dashed border-[#e6b3c9]">
                                                <p><span className="font-bold text-[#c58ea4]">음식:</span> 엽떡이랑 허니콤보! 빨리와 💖</p>
                                            </div>
                                        </div>
                                        {sortedComments.map(c => (
                                            <div key={c.id} className="bg-white border border-[#f0d0de] rounded-xl p-4 shadow-sm">
                                                <div className="flex items-center space-x-2 mb-2"><CrownIcon className="w-4 h-4 text-[#d4af37]" /><span className="font-bold text-sm">{c.name} 공주님</span></div>
                                                {editingId === c.id ? (
                                                    <div className="space-y-2 bg-[#fcf8f9] p-2 rounded">
                                                        <input className="w-full text-xs p-1 border rounded font-sans" value={editFormData.allergies} onChange={e => setEditFormData({...editFormData, allergies: e.target.value})} />
                                                        <input className="w-full text-xs p-1 border rounded font-sans" value={editFormData.wishes} onChange={e => setEditFormData({...editFormData, wishes: e.target.value})} />
                                                        <textarea className="w-full text-xs p-1 border rounded h-12 resize-none font-sans" value={editFormData.message} onChange={e => setEditFormData({...editFormData, message: e.target.value})} />
                                                        <div className="flex justify-end space-x-2 text-[10px] font-bold">
                                                            <button onClick={() => setEditingId(null)}>취소</button>
                                                            <button onClick={() => handleUpdate(c.id)} className="text-[#c58ea4]">저장</button>
                                                        </div>
                                                    </div>
                                                ) : (
                                                    <>
                                                        <div className="text-xs text-[#7c6373] space-y-1 bg-[#fcf8f9] p-3 rounded-lg">
                                                            <p><span className="font-bold text-[#c58ea4]">못 먹는것:</span> {c.allergies}</p>
                                                            <p><span className="font-bold text-[#c58ea4]">먹고싶은것:</span> {c.wishes}</p>
                                                            {c.message && <p><span className="font-bold text-[#c58ea4]">남긴말:</span> {c.message}</p>}
                                                        </div>
                                                        {user && user.uid === c.userId && (
                                                            <div className="mt-2 flex justify-end space-x-3 text-[10px] text-[#a28695]">
                                                                <button onClick={() => {setEditingId(c.id); setEditFormData({allergies: c.allergies, wishes: c.wishes, message: c.message})}} className="flex items-center"><EditIcon className="mr-1"/>수정</button>
                                                                {deletingId === c.id ? (
                                                                    <div className="flex space-x-2"><button onClick={() => handleDelete(c.id)} className="text-red-500">정말 삭제?</button><button onClick={() => setDeletingId(null)}>취소</button></div>
                                                                ) : (
                                                                    <button onClick={() => setDeletingId(c.id)} className="flex items-center"><TrashIcon className="mr-1"/>삭제</button>
                                                                )}
                                                            </div>
                                                        )}
                                                    </>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
